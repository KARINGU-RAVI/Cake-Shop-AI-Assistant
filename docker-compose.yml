version: '3.8'

services:
  cake-shop-agent:
    image: cake-shop-sales-agent:latest
    pull_policy: never
    container_name: cake-shop-sales-agent
    ports:
      - "8000:8000"
    volumes:
      - cake_db_volume:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/cake_shop.db
    env_file:
      - .env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: cake-shop-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "cake-shop-agent:8000"
      - "--domain=mural-establish-trapped.ngrok-free.dev"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - cake-shop-agent

volumes:
  cake_db_volume:
    driver: local
